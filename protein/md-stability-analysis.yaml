schema_version: "opensciflow.workflow/v0.1"
workflow_name: "molecular-dynamics-stability-analysis"
domain: ["molecular-dynamics"]
task_description: "Analyze an MD trajectory for structural stability and simulation quality."
inputs:
  - { name: "topology", type: "file", formats: ["pdb", "gro", "psf"], required: true }
  - { name: "trajectory", type: "file", formats: ["xtc", "trr", "dcd"], required: true }
outputs:
  - { name: "rmsd_csv", type: "file", formats: ["csv"], required: true }
  - { name: "rmsf_csv", type: "file", formats: ["csv"], required: true }
  - { name: "rg_csv", type: "file", formats: ["csv"], required: true }
  - { name: "quality_warnings", type: "file", formats: ["json"], required: true }
  - { name: "md_stability_report", type: "file", formats: ["md"], required: true }
plugins:
  required: ["mdanalysis-trajectory-analysis"]
  optional: ["gromacs-md-stability", "mdtraj-analysis"]
fallbacks:
  - if: "MDAnalysis missing"
    use: "MDTraj analysis"
steps:
  - { id: "load_inputs", description: "Load topology and trajectory.", consumes: ["topology", "trajectory"], produces: ["loaded_universe"] }
  - { id: "check_quality", description: "Check frames, atom count, missing coordinates.", depends_on: ["load_inputs"], consumes: ["loaded_universe"], produces: ["quality_warnings"] }
  - { id: "compute_rmsd", description: "Backbone RMSD over time.", depends_on: ["check_quality"], consumes: ["loaded_universe"], produces: ["rmsd_csv"] }
  - { id: "compute_rmsf", description: "Residue fluctuation profile.", depends_on: ["check_quality"], consumes: ["loaded_universe"], produces: ["rmsf_csv"] }
  - { id: "compute_rg", description: "Radius of gyration over time.", depends_on: ["check_quality"], consumes: ["loaded_universe"], produces: ["rg_csv"] }
  - { id: "report", description: "Generate report and reproducibility manifest.", depends_on: ["compute_rmsd", "compute_rmsf", "compute_rg"], consumes: ["rmsd_csv", "rmsf_csv", "rg_csv", "quality_warnings"], produces: ["md_stability_report"] }
dag:
  load_inputs: []
  check_quality: ["load_inputs"]
  compute_rmsd: ["check_quality"]
  compute_rmsf: ["check_quality"]
  compute_rg: ["check_quality"]
  report: ["compute_rmsd", "compute_rmsf", "compute_rg"]
estimated_runtime:
  small: "1-5 min"
  typical: "5-60 min"
hardware:
  cpu_cores_min: 2
  memory_gb_min: 4
  gpu: false
reproducibility:
  record_inputs_hash: true
  record_tool_versions: true
  record_commands: true
  record_environment: true
report_template: "reports/md_stability.md.j2"
example_dataset:
  name: "MDAnalysis sample trajectory or project-provided tiny trajectory"
  status: "candidate; license, citation, size, and hashes must be recorded before demo-ready status"
limitations:
  - "Analysis quality depends on simulation setup and sampling length."
