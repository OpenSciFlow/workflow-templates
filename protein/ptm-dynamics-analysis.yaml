schema_version: "opensciflow.workflow/v0.1"
workflow_name: "ptm-dynamics-analysis"
domain: ["post-translational-modification", "molecular-dynamics"]
task_description: "Compare unmodified and PTM-modified protein structures or trajectories to identify dynamic changes."
inputs:
  - { name: "unmodified_structure_or_trajectory", type: "file", formats: ["pdb", "xtc", "dcd"], required: true }
  - { name: "ptm_structure_or_trajectory", type: "file", formats: ["pdb", "xtc", "dcd"], required: true }
  - { name: "ptm_site", type: "string", required: true }
outputs:
  - { name: "delta_rmsf", type: "file", formats: ["csv"], required: true }
  - { name: "site_environment", type: "file", formats: ["csv"], required: true }
  - { name: "ptm_dynamics_report", type: "file", formats: ["md"], required: true }
plugins:
  required: ["mdanalysis-trajectory-analysis"]
  optional: ["proteinflux-conformational-dynamics", "gromacs-md-stability"]
fallbacks:
  - if: "only structures provided"
    use: "static structural comparison"
steps:
  - { id: "validate_pairs", description: "Check that unmodified and PTM inputs are comparable.", consumes: ["unmodified_structure_or_trajectory", "ptm_structure_or_trajectory", "ptm_site"], produces: ["comparable_inputs"] }
  - { id: "align_structures_or_trajectories", description: "Align systems.", depends_on: ["validate_pairs"], consumes: ["comparable_inputs"], produces: ["aligned_inputs"] }
  - { id: "compute_local_changes", description: "Compute residue/site-level differences.", depends_on: ["align_structures_or_trajectories"], consumes: ["aligned_inputs", "ptm_site"], produces: ["site_environment"] }
  - { id: "compute_dynamics_delta", description: "Compare RMSF or ensemble metrics.", depends_on: ["align_structures_or_trajectories"], consumes: ["aligned_inputs"], produces: ["delta_rmsf"] }
  - { id: "report", description: "Generate PTM dynamics report.", depends_on: ["compute_local_changes", "compute_dynamics_delta"], consumes: ["site_environment", "delta_rmsf"], produces: ["ptm_dynamics_report"] }
dag:
  validate_pairs: []
  align_structures_or_trajectories: ["validate_pairs"]
  compute_local_changes: ["align_structures_or_trajectories"]
  compute_dynamics_delta: ["align_structures_or_trajectories"]
  report: ["compute_local_changes", "compute_dynamics_delta"]
estimated_runtime:
  small: "5-20 min for existing trajectories"
hardware:
  cpu_cores_min: 4
  memory_gb_min: 8
  gpu: false
reproducibility:
  record_inputs_hash: true
  record_tool_versions: true
  record_commands: true
  record_environment: true
  record_ptm_definition: true
  record_force_field_if_simulated: true
report_template: "reports/ptm_dynamics.md.j2"
example_dataset:
  name: "paired unmodified/PTM sample"
  status: "candidate; paired inputs and PTM definition must be public or regenerable before demo-ready status"
limitations:
  - "PTM force-field quality can dominate results."
